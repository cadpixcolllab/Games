<!DOCTYPE html>
<html lang="en">

            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* Header Styling */
        header {
            background-color: #ffffff;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);

        .game-wrapper {

            position: relative;
