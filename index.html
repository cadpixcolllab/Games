<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Retro Bowl Unblocked Game</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f5, #072 70%);
      color: #ddf;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
    }
    #game-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    canvas {
      width: 100%;
      max-width: 760px;
      height: auto;
      background: #0b3;
      border: 4px solid #0a2;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      image-rendering: pixelated;
      display: block;
      margin: 0 auto;
    }
    .panel {
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid #2f7;
      padding: 14px;
      margin: 14px auto;
      max-width: 760px;
    }
    button {
      background: #083;
      border: 2px solid #1f5;
      color: #cff;
      font-size: 1rem;
      padding: 10px 18px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      background: #0a5;
    }
    #controls {
      margin-top: 10px;
      font-size: 0.95rem;
    }
    .status {
      margin: 8px 0 0;
      color: #dff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <h1>Retro Bowl</h1>
    <p>Use the arrow keys to move the quarterback. Press <b>Space</b> to throw. Score a touchdown before the defense brings you down.</p>

    <div class="panel">
      <div id="scoreboard">Score: 0 | Down: 1 | To Go: 10 | Clock: 60</div>
      <canvas id="game" width="640" height="360"></canvas>
      <div id="controls">Controls: ← ↑ ↓ → to move • Space to pass • R to restart</div>
      <div class="status" id="message">Welcome to Retro Bowl. Drive the ball!</div>
      <button id="restart">Restart Game</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreboard = document.getElementById('scoreboard');
    const message = document.getElementById('message');
    const restartButton = document.getElementById('restart');

    const width = canvas.width;
    const height = canvas.height;

    const state = {
      score: 0,
      down: 1,
      yardsToGo: 10,
      clock: 60,
      paused: false,
      gameOver: false,
      playMessage: 'Move, pass, and score!'
    };

    const player = {
      x: 80,
      y: height / 2 - 12,
      w: 18,
      h: 18,
      speed: 4,
      hasBall: true
    };

    let defenders = [];
    let receiver = null;
    let passActive = false;
    let controls = { left: false, right: false, up: false, down: false };

    function randomLane() {
      const lanes = [80, 140, 200, 260, 320];
      return lanes[Math.floor(Math.random() * lanes.length)];
    }

    function newPlay(reason = 'New drive started.') {
      player.x = 80;
      player.y = height / 2 - player.h / 2;
      passActive = false;
      defenders = [];
      receiver = {
        x: 520,
        y: randomLane(),
        w: 18,
        h: 18
      };
      for (let i = 0; i < 4; i += 1) {
        defenders.push({
          x: 240 + i * 80,
          y: randomLane(),
          w: 18,
          h: 18,
          speed: 1 + Math.random() * 1.6,
          direction: Math.random() > 0.5 ? 1 : -1
        });
      }
      state.playMessage = reason;
    }

    function restartGame() {
      state.score = 0;
      state.down = 1;
      state.yardsToGo = 10;
      state.clock = 60;
      state.paused = false;
      state.gameOver = false;
      newPlay('Kickoff. Let’s go!');
    }

    function drawField() {
      ctx.fillStyle = '#0a4';
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = '#1e7';
      ctx.lineWidth = 2;
      for (let x = 0; x <= width; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      ctx.fillStyle = '#0dd';
      ctx.fillRect(width - 40, 0, 40, height);
      ctx.fillStyle = '#063';
      ctx.fillRect(width - 40, 0, 10, height);
      ctx.fillRect(width - 40, height - 40, 40, 40);
    }

    function drawPlayer() {
      ctx.fillStyle = '#ff5';
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.strokeStyle = '#000';
      ctx.strokeRect(player.x, player.y, player.w, player.h);
    }

    function drawDefenders() {
      ctx.fillStyle = '#c00';
      defenders.forEach(def => {
        ctx.fillRect(def.x, def.y, def.w, def.h);
        ctx.strokeStyle = '#400';
        ctx.strokeRect(def.x, def.y, def.w, def.h);
      });
    }

    function drawReceiver() {
      ctx.fillStyle = '#4ef';
      ctx.fillRect(receiver.x, receiver.y, receiver.w, receiver.h);
      ctx.strokeStyle = '#06a';
      ctx.strokeRect(receiver.x, receiver.y, receiver.w, receiver.h);
    }

    function updateDefenders() {
      defenders.forEach(def => {
        def.y += def.speed * def.direction;
        if (def.y < 20 || def.y > height - 40) {
          def.direction *= -1;
        }
        if (Math.abs(def.x - player.x) < 30 && Math.abs(def.y - player.y) < 26) {
          tackle('Tackle! Defense got you.');
        }
      });
    }

    function updatePlayer() {
      if (controls.left) player.x -= player.speed;
      if (controls.right) player.x += player.speed;
      if (controls.up) player.y -= player.speed;
      if (controls.down) player.y += player.speed;
      player.x = Math.max(10, Math.min(width - player.w - 10, player.x));
      player.y = Math.max(10, Math.min(height - player.h - 10, player.y));
      if (player.x > width - 56) {
        touchdown();
      }
    }

    function updateClock() {
      if (state.gameOver || state.paused) return;
      if (state.clock > 0) {
        state.clock -= 0.02;
      }
      if (state.clock <= 0) {
        state.clock = 0;
        state.gameOver = true;
        state.playMessage = 'Time’s up! Press restart to play again.';
      }
    }

    function tackle(reason) {
      if (state.gameOver) return;
      state.down += 1;
      if (state.down > 4) {
        state.gameOver = true;
        state.playMessage = 'Turnover on downs. Restart to try again.';
      } else {
        newPlay(reason + ' Next down.');
      }
    }

    function touchdown() {
      state.score += 7;
      state.down = 1;
      state.yardsToGo = 10;
      state.clock = Math.max(10, state.clock - 3);
      newPlay('Touchdown! Reset on the next drive.');
    }

    function passBall() {
      if (passActive || state.gameOver) return;
      passActive = true;
      const dx = receiver.x - player.x;
      const dy = receiver.y - player.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const defenderPenalty = defenders.reduce((sum, def) => {
        const ddx = def.x - player.x;
        const ddy = def.y - player.y;
        return sum + Math.max(0, 100 - Math.sqrt(ddx * ddx + ddy * ddy));
      }, 0) / 70;
      const chance = Math.max(0.18, 0.85 - distance / 260 - defenderPenalty * 0.06);
      if (Math.random() < chance) {
        player.x = receiver.x - player.w - 2;
        player.y = receiver.y;
        state.yardsToGo -= 8;
        state.yardsToGo = Math.max(1, state.yardsToGo);
        state.playMessage = 'Great pass! Keep moving to the end zone.';
      } else {
        state.playMessage = 'Pass was broken up! Defense wins the day.';
        tackle('Intercepted!');
      }
      passActive = false;
    }

    function drawHud() {
      scoreboard.textContent = `Score: ${state.score} | Down: ${state.down} | To Go: ${state.yardsToGo} | Clock: ${Math.ceil(state.clock)}`;
      message.textContent = state.playMessage;
    }

    function step() {
      if (!state.gameOver) {
        updatePlayer();
        updateDefenders();
        updateClock();
      }
      drawField();
      drawReceiver();
      drawDefenders();
      drawPlayer();
      drawHud();
      requestAnimationFrame(step);
    }

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') controls.left = true;
      if (event.key === 'ArrowRight') controls.right = true;
      if (event.key === 'ArrowUp') controls.up = true;
      if (event.key === 'ArrowDown') controls.down = true;
      if (event.code === 'Space') {
        event.preventDefault();
        passBall();
      }
      if (event.key.toLowerCase() === 'r') {
        restartGame();
      }
    });

    window.addEventListener('keyup', (event) => {
      if (event.key === 'ArrowLeft') controls.left = false;
      if (event.key === 'ArrowRight') controls.right = false;
      if (event.key === 'ArrowUp') controls.up = false;
      if (event.key === 'ArrowDown') controls.down = false;
    });

    restartButton.addEventListener('click', restartGame);
    restartGame();
    step();
  </script>
</body>
</html>
